<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hand studios | Interactive Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #fff;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 인트로 화면 */
        #intro {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        /* 메인 콘텐츠 화면 */
        #main-content {
            display: none;
            text-align: center;
        }

        /* 메인 타이포그래피 */
        .title {
            font-size: 5vw; /* 크기 조절 */
            text-transform: lowercase; /* 소문자 강제 적용 */
            margin: 0;
            position: relative;
            display: inline-block;
            transition: transform 0.05s ease-out, letter-spacing 0.05s ease-out;
            cursor: crosshair;
        }

        /* CSS 글리치 */
        .title:hover::before, .title:hover::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .title:hover::before {
            left: 2px;
            text-shadow: -2px 0 red;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .title:hover::after {
            left: -2px;
            text-shadow: -2px 0 cyan;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        /* 하단 예약/유튜브 안내 텍스트 (여기가 핵심!) */
        .footer-nav {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 2s forwards 1s; 
        }
        .footer-nav a, .footer-nav a:visited { 
            color: #fff; /* 방문 전이나 후나 무조건 하얀색 */
            text-decoration: none; 
            cursor: pointer; 
            transition: color 0.3s; 
        }
        .footer-nav a { 
            color: #fff; /* 파란색 기본 링크를 하얀색으로 강제 변경 */
            text-decoration: none; 
            cursor: pointer; 
            transition: color 0.3s; 
        }
        
        .footer-nav a:hover { 
            color: red; /* 마우스 올리면 빨간색으로 변함 */
        }

        @keyframes fadeIn { to { opacity: 0.5; } }
        /* ========================================= */
        /* 모바일 화면용 설정 (화면 너비가 768px 이하일 때만 작동) */
        /* ========================================= */
        @media (max-width: 768px) {
            /* 하단 메뉴 폰트 조절 */
            .footer-nav {
                font-size: 0.55rem; /* 글씨 크기를 확 줄임 (기존 0.8rem) */
                letter-spacing: 1.5px; /* 자간도 모바일에 맞게 살짝 줄임 */
                bottom: 25px; /* 화면 맨 밑에서 살짝 더 띄움 */
            }
            
            /* 모바일에서는 손가락으로 터치하기 쉽게 투명한 여백(padding)을 줌 */
            .footer-nav a {
                padding: 10px;
            }

            /* 참고: 메인 타이틀 글씨 크기도 폰에서 너무 크면 여기서 줄일 수 있어! */
            .title {
                font-size: 9vw; /* 모바일용 메인 텍스트 크기 조절 */
            }
        }
    </style>
</head>
<body>

    <audio id="bgm" src="music.mp3" loop></audio>

    <div id="intro">
        <button id="enter-btn">ENTER THE SPACE</button>
    </div>

    <div id="main-content">
        <h1 class="title" data-text="hand studios">hand studios</h1>
        
        <div class="footer-nav">
            <a href="https://hourplace.co.kr/place/59686" target="_blank">[ BOOK SESSION ]</a>
            <a href="https://www.instagram.com/handstudios__/" target="_blank">[ INSTAGRAM ]</a>
            
            <a href="https://www.youtube.com/@handstudios_yt" target="_blank">[ VIDEO ]</a>
        </div>
    </div>

    <script>
        const enterBtn = document.getElementById('enter-btn');
        const intro = document.getElementById('intro');
        const mainContent = document.getElementById('main-content');
        const bgm = document.getElementById('bgm');
        const title = document.querySelector('.title');

        let audioContext, analyser, dataArray;

        enterBtn.addEventListener('click', () => {
            intro.style.display = 'none';
            mainContent.style.display = 'block';
            bgm.play();

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(bgm);
            analyser = audioContext.createAnalyser();
            
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            animateTypography();
        });

        function animateTypography() {
            requestAnimationFrame(animateTypography);
            analyser.getByteFrequencyData(dataArray);

            let bassSum = 0;
            for(let i = 0; i < 10; i++) {
                bassSum += dataArray[i];
            }
            const bassAvg = bassSum / 10;

            const scale = 1 + (bassAvg / 1000); 
            const spacing = (bassAvg / 20) + 'px';

            title.style.transform = `scale(${scale})`;
            title.style.letterSpacing = spacing;
        }
    </script>

</body>
</html>
